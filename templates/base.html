{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>{% block title %}City Hospital{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://use.fontawesome.com/releases/v5.15.4/css/all.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand text-primary" href="{% url 'home' %}">City Hospital</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav ms-auto fw-bold">
                    <li class="nav-item"><a class="nav-link text-primary" href="{% url 'home' %}">Home</a></li>
                    <li class="nav-item"><a class="nav-link text-primary" href="{% url 'about' %}">About</a></li>
                    <li class="nav-item"><a class="nav-link text-primary" href="{% url 'doctors' %}">Doctors</a></li>
                    <li class="nav-item"><a class="nav-link text-primary" href="{% url 'department' %}">Departments</a></li>
                    <li class="nav-item"><a class="nav-link text-primary" href="{% url 'booking' %}">Booking</a></li>
                    <li class="nav-item"><a class="nav-link text-primary" href="{% url 'contact' %}">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- CONTENT -->
    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>

    <!-- FOOTER -->
    <footer class="bg-primary text-light p-3 mt-5">
        <div class="container d-flex justify-content-between flex-wrap">
            <div>
                <h6>Emergency: 0123456789</h6>
                <h6>Ambulance: 0987654321</h6>
                <h6>Location: Kochi, Kerala, India</h6>
            </div>
            <div>© 2026 City Hospital</div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
const counters = document.querySelectorAll('.counter');
counters.forEach(counter => {
    counter.innerText = '0';
    const updateCounter = () => {
        const target = +counter.getAttribute('data-target');
        const current = +counter.innerText;
        const increment = target / 100;

        if (current < target) {
            counter.innerText = Math.ceil(current + increment);
            setTimeout(updateCounter, 20);
        } else {
            counter.innerText = target;
        }
    };
    updateCounter();
});
</script>
</body>
</html>
