{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>City Hospital</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    <style>
        body {
            font-family: Arial, sans-serif;
        }

        .navbar-brand {
            font-weight: bold;
            font-size: 24px;
        }

        .carousel-item img {
            height: 550px;
            object-fit: cover;
        }

        .top-bar {
            background: #0d6efd;
            color: white;
            padding: 8px 0;
            font-size: 14px;
        }

        .top-bar span {
            margin-right: 20px;
        }
    </style>
</head>

<body>

<!-- TOP BAR -->
<div class="top-bar text-center">
    <span> Kochi, Ernakulam, Kerala, India</span>
    <span> Ambulance: +91 98765 43210</span>
    <span> Emergency: +91 91234 56789</span>
</div>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
    <div class="container">
        <a class="navbar-brand text-primary" href="#">City Hospital</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="#">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="#">About</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Doctors</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Departments</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Booking</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- IMAGE SLIDER -->
<div id="hospitalSlider" class="carousel slide" data-bs-ride="carousel">

    <div class="carousel-inner">

        <div class="carousel-item active">
            <img src="{% static 'css/images/image1.jpeg' %}" class="d-block w-100" alt="Hospital Exterior">
        </div>

        <div class="carousel-item">
            <img src="{% static 'css/images/image2.jpeg' %}" class="d-block w-100" alt="Hospital Interior">
        </div>

        <div class="carousel-item">
            <img src="{% static 'css/images/image3.jpeg' %}" class="d-block w-100" alt="Medical Services">
        </div>

    </div>

</div>

<!-- CONTENT BLOCK -->
<div class="container my-5">
    {% block content %}
    {% endblock %}
</div>

<!-- FOOTER -->
<footer class="bg-dark text-white text-center p-3">
    <p class="mb-0">© 2026 City Hospital | All Rights Reserved</p>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
