{% extends 'base.html' %}

{% block title %}
Booking
{% endblock %}

{% block content %}
<h1 class="text-center my-4">Make an Appointment</h1>
<br>

<div class="container w-50 p-4 my-5 bg-light rounded shadow">
    <form action="" method="POST">
        {% csrf_token %}
        
        <div class="mb-3">
            <label class="form-label fw-bold">Patient Name</label>
            <input type="text" name="patient_name" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label fw-bold">Patient Phone</label>
            <input type="tel" name="patient_phone" class="form-control" 
                   onkeypress="return event.charCode >= 48 && event.charCode <= 57"
                   oninput="this.value = this.value.replace(/[^0-9]/g, '')"
                   placeholder="Enter numbers only" required>
            <small class="text-muted">Numbers only (0-9)</small>
        </div>

        <div class="mb-3">
            <label class="form-label fw-bold">Patient Email</label>
            <input type="email" name="patient_email" class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label fw-bold">Doctor Name</label>
            <select name="doctor" class="form-control" required>
                <option value="">Select Doctor</option>
                <option value="Dr. Smith">Dr. Smith</option>
                <option value="Dr. Johnson">Dr. Johnson</option>
                <option value="Dr. Williams">Dr. Williams</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label fw-bold">Appointment Date</label>
            <input type="date" name="appointment_date" class="form-control" required>
        </div>

        <button class="btn btn-primary w-100 mt-3" type="submit">Submit Appointment</button>
    </form>
</div>

{% if messages %}
    {% for message in messages %}
        <div class="alert alert-success text-center">{{ message }}</div>
    {% endfor %}
{% endif %}

{% endblock %}
